<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習診斷系統 | Loading...</title>
    
    <link rel="icon" href="diagnosis.png" type="image/png">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* 這裡幫您配了一個充滿學術與科技感的漸層背景 */
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Logo 專屬的呼吸燈動畫容器 */
        .logo-container {
            animation: pulse 2s infinite ease-in-out;
        }
        
        /* 呼叫您倉庫裡的 diagnosis.png */
        .logo-container img {
            width: 160px; /* 如果覺得太大或太小可以改這個數字 */
            height: auto;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }
        
        .loading-text {
            margin-top: 24px;
            font-size: 1.2rem;
            color: #475569;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        /* 呼吸燈動畫關鍵影格 */
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.85; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.85; }
        }
        
        /* 下方的載入轉圈圈 */
        .spinner {
            margin-top: 16px;
            width: 36px;
            height: 36px;
            border: 4px solid #cbd5e1;
            border-top: 4px solid #3b82f6; /* 科技藍色轉輪 */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="diagnosis.png" alt="學習診斷系統 Logo">
    </div>

    <div class="loading-text">系統載入中，即將為您跳轉...</div>
    <div class="spinner"></div>

    <script>
        // 🚨 總製作人請注意！🚨
        // 請務必把下面引號裡的網址，換成您這個專案部署在 Streamlit 的真實網址！
        const targetUrl = "https://learning-diagnosis-test.streamlit.app/";
        
        // 設定 2.5 秒 (2500毫秒) 後自動跳轉
        setTimeout(function() {
            window.location.href = targetUrl;
        }, 2500);
    </script>

</body>
</html>
